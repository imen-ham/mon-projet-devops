# Pipeline CI/CD - Projet DevOps Master 1
name: Pipeline CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installer les dépendances backend
        working-directory: ./backend
        run: npm install

      - name: Lancer les tests backend
        working-directory: ./backend
        run: npm test

      - name: Installer les dépendances frontend
        working-directory: ./frontend
        run: npm install

      - name: Build du frontend
        working-directory: ./frontend
        run: npm run build

  build-images:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et push image backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Build et push image frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Déployer avec Docker Compose
        run: docker compose up -d --pull always